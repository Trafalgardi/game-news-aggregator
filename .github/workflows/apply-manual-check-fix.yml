name: Apply manual-check classification fix

on:
  push:
    branches: [agent/fix-manual-check-classification]
    paths:
      - ".github/workflows/apply-manual-check-fix.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/fix-manual-check-classification
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Patch collector and verify
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/game_news/collector.py')
          text = path.read_text(encoding='utf-8')

          old = '''    if rejection_summary.get("invalid_url", 0) > 0:\n        return "invalid_articles"\n    if any(item.get("outcome") == "empty" for item in attempts):\n        return "no_articles_found"\n    return "unknown"\n'''
          new = '''    if rejection_summary.get("invalid_url", 0) > 0:\n        return "invalid_articles"\n    if any(\n        str(item.get("stage", "")).startswith(("feed", "sitemap"))\n        and item.get("outcome") == "ok"\n        and int(item.get("item_count") or 0) > 0\n        for item in attempts\n    ):\n        return "no_recent_articles"\n    if any(item.get("outcome") == "empty" for item in attempts):\n        return "no_articles_found"\n    return "unknown"\n'''
          if old not in text:
              raise SystemExit('failure-kind patch target not found')
          text = text.replace(old, new, 1)

          old = '''        manual_check = _manual_check_for(\n            source, method, feeds, sitemaps, attempts, failure_kind, summary_dict\n        )\n'''
          new = '''        manual_check = None\n        if not articles:\n            manual_check = _manual_check_for(\n                source, method, feeds, sitemaps, attempts, failure_kind, summary_dict\n            )\n'''
          if old not in text:
              raise SystemExit('manual-check patch target not found')
          text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY

          python -m pip install -e ".[dev]"
          python -m ruff check .
          python -m pytest

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/game_news/collector.py
          git commit -m "fix: classify manual checks correctly"
          git push origin HEAD:agent/fix-manual-check-classification
