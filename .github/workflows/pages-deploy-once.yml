name: Deploy Pages once

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages-deploy-once.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Save deployment result
        shell: bash
        env:
          DEPLOYMENT_OUTCOME: ${{ steps.deployment.outcome }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          result = {
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "outcome": os.environ.get("DEPLOYMENT_OUTCOME"),
              "page_url": os.environ.get("PAGE_URL") or None,
          }
          Path("public/pages-deploy-status.json").write_text(
              json.dumps(result, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/pages-deploy-status.json
          if ! git diff --cached --quiet; then
            git commit -m "ci: record Pages deployment status"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Fail when deployment failed
        if: steps.deployment.outcome != 'success'
        run: exit 1
