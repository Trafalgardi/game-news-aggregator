name: Collect and publish news

on:
  workflow_dispatch:
    inputs:
      window_hours:
        description: "Rolling window for public/latest.json"
        required: false
        default: "36"
      strict_min_success:
        description: "Fail when fewer sources work; use 0 while setting up"
        required: false
        default: "0"
  schedule:
    - cron: "17 7 * * *"
      timezone: "Europe/Amsterdam"

concurrency:
  group: game-news-collector
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      WINDOW_HOURS: ${{ inputs.window_hours || '36' }}
      STRICT_MIN_SUCCESS: ${{ inputs.strict_min_success || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate configuration
        run: python -m game_news validate-config

      - name: Run tests
        run: python -m pytest

      - name: Collect all configured sources
        shell: bash
        run: |
          set -o pipefail
          python -m game_news collect \
            --all-sources \
            --hours "$WINDOW_HOURS" \
            --strict-min-success "$STRICT_MIN_SUCCESS" \
            2>&1 | tee public/collection-console.log

      - name: Print problem summary
        if: always()
        shell: bash
        run: |
          echo "=== Collection run ==="
          cat public/collection-run.log 2>/dev/null || true
          echo "=== Problem sources ==="
          if [ -f public/diagnostics.md ]; then
            sed -n '1,240p' public/diagnostics.md
          else
            echo "diagnostics.md was not generated"
          fi

      - name: Commit generated history, feed, and diagnostics
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles.jsonl data/state.json public
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
          else
            git commit -m "data: update game news feed and diagnostics"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public
          include-hidden-files: true

  deploy:
    needs: collect
    if: always() && needs.collect.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
