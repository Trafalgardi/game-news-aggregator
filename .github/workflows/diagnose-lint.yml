name: Diagnose lint

on:
  push:
    branches: [agent/drop-stale-and-manual-checks]
    paths:
      - ".github/workflows/diagnose-lint.yml"

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/drop-stale-and-manual-checks
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - name: Capture Ruff output
        shell: bash
        run: |
          set +e
          python -m ruff check . > lint-output.txt 2>&1
          code=$?
          echo "exit_code=$code" >> lint-output.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lint-output.txt
          git commit -m "chore: capture lint output" || true
          git push origin HEAD:agent/drop-stale-and-manual-checks
          exit 0
