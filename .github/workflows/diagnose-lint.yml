name: Apply lint fix

on:
  push:
    branches: [agent/drop-stale-and-manual-checks]
    paths:
      - ".github/workflows/diagnose-lint.yml"

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/drop-stale-and-manual-checks
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Remove unused import and verify
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/game_news/collector.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('from urllib.parse import urlparse\n', '')
          path.write_text(text, encoding='utf-8')
          PY
          python -m pip install -e ".[dev]"
          python -m ruff check .
          python -m pytest
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/game_news/collector.py
          git commit -m "fix: remove unused collector import" || true
          git push origin HEAD:agent/drop-stale-and-manual-checks
