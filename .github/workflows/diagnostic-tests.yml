name: Diagnostic tests

on:
  push:
    branches: [agent/all-sources-diagnostics]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/all-sources-diagnostics
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - name: Run tests and save output
        shell: bash
        run: |
          set +e
          python -m pytest -vv > test-output.txt 2>&1
          code=$?
          echo "exit_code=$code" >> test-output.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add test-output.txt
          git commit -m "chore: capture diagnostic test output" || true
          git push origin HEAD:agent/all-sources-diagnostics
          exit 0
