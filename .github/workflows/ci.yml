name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "data/**"
      - "public/**"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate configuration
        run: python -m game_news validate-config

      - name: Lint
        run: python -m ruff check src tests

      - name: Test
        run: python -m pytest
