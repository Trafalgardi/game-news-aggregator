name: Fast all-source audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v7
        with:
          ref: agent/run-fast-all-source-audit
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install and verify
        run: |
          python -m pip install -e ".[dev]"
          python -m game_news validate-config
          python -m ruff check src tests
          python -m pytest

      - name: Audit all 92 configured sources
        shell: bash
        run: |
          set -o pipefail
          python -m game_news collect --all-sources --hours 36 --strict-min-success 0 \
            2>&1 | tee public/collection-console.log

      - name: Commit audit output
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles.jsonl data/state.json public
          git commit -m "chore: capture fast all-source audit" || true
          git push origin HEAD:agent/run-fast-all-source-audit
